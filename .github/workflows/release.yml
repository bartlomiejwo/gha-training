on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: self-hosted
    env:
      PIP_CACHE_DIR: ~/.cache/pip
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ${{ env.PIP_CACHE_DIR }}
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Docker image
        run: |
          DOCKER_BUILDKIT=1 docker build \
            --cache-to=type=inline \
            --cache-from=type=registry,ref=ghcr.io/${{ github.repository }}:buildcache \
            -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}

  deploy-staging:
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      environment: staging
      namespace: staging
      values_file: fastapi-chart/values-staging.yaml
      image_tag: ${{ github.ref_name }}
    needs: build

  deploy-prod:
    uses: ./.github/workflows/deploy-k8s.yml
    with:
      environment: prod
      namespace: prod
      values_file: fastapi-chart/values-prod.yaml
      image_tag: ${{ needs.deploy-staging.outputs.image_tag }}
    needs: deploy-staging
