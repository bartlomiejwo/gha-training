name: CI

on:
  push:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Set short SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }} .

      - name: Push Docker image
        run: docker push ghcr.io/${{ github.repository }}:${{ env.SHORT_SHA }}

      - name: Create Kubernetes namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Create Kubernetes ghcr-secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            -n dev \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic fastapi-secret \
            -n dev \
            --from-literal=APP_SECRET=${{ secrets.APP_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          helm upgrade --install fastapi-app ./fastapi-chart \
            --namespace dev \
            --create-namespace \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ env.SHORT_SHA }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/fastapi-app -n dev --timeout=60s
        
