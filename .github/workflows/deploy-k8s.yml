name: deploy-k8s

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      namespace:
        required: true
        type: string
      values_file:
        required: true
        type: string

jobs:
  deploy:
    runs-on: self-hosted  
    
    steps:
      - name: Create Kubernetes namespace
        run: kubectl apply -f k8s/namespace-${{ inputs.namespace }}.yaml

      - name: Create Kubernetes ghcr-secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            -n ${{ inputs.namespace }} \
            --docker-server=ghcr.io \
            --docker-username=${{ github.actor }} \
            --docker-password=${{ secrets.GITHUB_TOKEN }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create Kubernetes secret
        run: |
          kubectl create secret generic fastapi-secret \
            -n ${{ inputs.namespace }} \
            --from-literal=APP_SECRET=${{ secrets.APP_SECRET }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Helm deploy
        run: |
          helm upgrade --install fastapi-app ./fastapi-chart \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            -f ${{ inputs.values_file }} \
            --set image.repository=ghcr.io/${{ github.repository }} \
            --set image.tag=${{ needs.build.outputs.SHORT_SHA }}

      - name: Wait for rollout
        run: kubectl rollout status deployment/fastapi-app -n ${{ inputs.namespace }} --timeout=60s

